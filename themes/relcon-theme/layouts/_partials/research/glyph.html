{{- /* Project glyph badge. Args: dict "glyph" "accent" "size" */ -}}
{{- $size := .size | default 48 -}}
{{- $fs   := mul $size 0.5 -}}
<span class="inline-grid place-items-center font-mono" style="
  width: {{ $size }}px; height: {{ $size }}px;
  background: var(--c-code-bg); border: 1px solid var(--c-border);
  color: {{ .accent }}; font-size: {{ $fs }}px; line-height: 1;">{{ .glyph }}</span>
