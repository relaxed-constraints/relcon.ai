<figure class="my-8"{{ with .Get "width" }} style="max-width: {{ . }}; margin-left: auto; margin-right: auto;"{{ end }}>
  <img src="{{ .Get "src" }}" alt="{{ .Get "alt" }}" class="rounded-lg w-full{{ if eq (.Get "invert") "true" }} dark:[filter:invert(1)_hue-rotate(180deg)]{{ end }}">
  {{ with .Get "caption" }}<figcaption class="text-sm text-gray-500 text-center mt-3">{{ . }}</figcaption>{{ end }}
</figure>
