<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}" class="dark">
<head>
  {{/* Theme init — runs before render to prevent flash */}}
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (theme === 'light' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  {{ partial "head.html" . }}
</head>
<body class="min-h-screen flex flex-col bg-dark text-off-white font-body">
  {{ partial "header.html" . }}
  <main class="flex-grow">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{- if .Store.Get "hasCharts" }}
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"
    onload="document.dispatchEvent(new Event('chartjs:loaded'))"></script>
  {{- end }}
  {{ if hugo.IsProduction }}
  <script data-goatcounter="https://relconai.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  {{ end }}
</body>
</html>
